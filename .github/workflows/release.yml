name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version and tag release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          VERSION=${NEW_VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.version.outputs.version }}"

  build-linux:
    name: Build Linux release
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run electron:build:linux

      - name: Upload Linux artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: tcg-index-linux-${{ needs.bump-version.outputs.version }}
          path: |
            release/*.AppImage
            release/*.deb

      - name: Attach Linux artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: TCG Index v${{ needs.bump-version.outputs.version }}
          files: |
            release/*.AppImage
            release/*.deb
          generate_release_notes: true

  build-windows:
    name: Build Windows release
    needs: bump-version
    runs-on: windows-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run electron:build:win

      - name: Upload Windows artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: tcg-index-windows-${{ needs.bump-version.outputs.version }}
          path: |
            release/*.exe
            release/*.yml

      - name: Attach Windows artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: TCG Index v${{ needs.bump-version.outputs.version }}
          files: |
            release/*.exe
            release/*.yml
          generate_release_notes: false
